pre-commit:
  jobs:
    - name: spotless-check
      run: ./gradlew spotlessCheck --no-daemon
    - name: checkstyle
      glob: "*.java"
      run: ./gradlew checkstyleMain --no-daemon

pre-push:
  jobs:
    - name: unit-tests
      run: ./gradlew test -x :boilerplate-boot:test --no-daemon
    - name: archunit
      run: ./gradlew :boilerplate-boot:test --tests "*ArchitectureTest*" --no-daemon
